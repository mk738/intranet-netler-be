name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        # All tests use mocks — these env vars satisfy Spring's property resolution
        # at context startup without connecting to any real service.
        env:
          JASYPT_PASSWORD:          ${{ secrets.JASYPT_PASSWORD          || 'ci-placeholder' }}
          RESEND_API_KEY:           ${{ secrets.RESEND_API_KEY           || 'ci-placeholder' }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON || '' }}
        run: mvn test --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7
