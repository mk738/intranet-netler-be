server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/intranet}
    username: ${DB_USERNAME:intranet}
    password: ${DB_PASSWORD:intranet}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

  jackson:
    # Serialize LocalDate/LocalDateTime/Instant as ISO-8601 strings, not arrays.
    # Without this, LocalDate becomes [2026, 3, 16] instead of "2026-03-16",
    # which breaks any frontend date parsing.
    serialization:
      write-dates-as-timestamps: false

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD}
    algorithm: PBEWithMD5AndTripleDES

mailersend:
  api-token: ${MAILERSEND_API_TOKEN}
  from-email: ${MAILERSEND_FROM_EMAIL:no-reply@yourcompany.com}
  from-name: ${MAILERSEND_FROM_NAME:Intranet}
  login-url: ${MAILERSEND_LOGIN_URL:https://intranet.yourcompany.com/login}
  site-url: ${MAILERSEND_SITE_URL:https://intranet.yourcompany.com}
  vacation-notify-email: ${MAILERSEND_VACATION_NOTIFY_EMAIL:}
  news-notify-email: ${MAILERSEND_NEWS_NOTIFY_EMAIL:}
  templates:
    invite: ${MAILERSEND_TEMPLATE_INVITE:vywj2lpy71jl7oqz}
    news: ${MAILERSEND_TEMPLATE_NEWS:k68zxl2613egj905}
    vacation-requested: ${MAILERSEND_TEMPLATE_VACATION_REQUESTED:pxkjn41wpn5lz781}
    vacation-reviewed: ${MAILERSEND_TEMPLATE_VACATION_REVIEWED:}
    event-created: ${MAILERSEND_TEMPLATE_EVENT_CREATED:}

firebase:
  credentials:
    # Empty default so local dev without the env var falls back to firebase-service-account.json file
    json: ${FIREBASE_CREDENTIALS_JSON:}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.company.intranet: DEBUG
    org.springframework.security: INFO