server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/intranet}
    username: ${DB_USERNAME:intranet}
    password: ${DB_PASSWORD:intranet}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

  jackson:
    # Serialize LocalDate/LocalDateTime/Instant as ISO-8601 strings, not arrays.
    # Without this, LocalDate becomes [2026, 3, 16] instead of "2026-03-16",
    # which breaks any frontend date parsing.
    serialization:
      write-dates-as-timestamps: false

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD}
    algorithm: PBEWithMD5AndTripleDES

resend:
  api-token: ${RESEND_API_TOKEN}
  from-email: ${RESEND_FROM_EMAIL:no-reply@yourcompany.com}
  from-name: ${RESEND_FROM_NAME:Intranet}
  login-url: ${RESEND_LOGIN_URL}
  site-url: ${RESEND_SITE_URL}
  templates:
    invite: ${RESEND_TEMPLATE_INVITE:}
    news: ${RESEND_TEMPLATE_NEWS:}
    vacation-requested: ${RESEND_TEMPLATE_VACATION_REQUESTED:}
    vacation-reviewed: ${RESEND_TEMPLATE_VACATION_REVIEWED:}
    event-created: ${RESEND_TEMPLATE_EVENT_CREATED:}

firebase:
  credentials:
    # Empty default so local dev without the env var falls back to firebase-service-account.json file
    json: ${FIREBASE_CREDENTIALS_JSON:}

storage:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  region: us-east-1
  bucket:
    avatars: avatars
    contracts: contracts
    cvs: cvs
    news-covers: news-covers
    board-attachments: board-attachments
  signed-url-expiry-minutes: 60

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.company.intranet: DEBUG
    org.springframework.security: INFO