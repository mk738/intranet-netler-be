# Spring profile: prod
# Used in Railway production environment
# Schema managed by Hibernate ddl-auto=update
# All secrets injected via Railway environment variables
# Activate with: SPRING_PROFILES_ACTIVE=prod
# WARNING: Never add hardcoded secrets to this file

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024
  tomcat:
    max-threads: 200
    min-spare-threads: 10

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

cors:
  allowed-origins: ${CORS_ORIGINS}

storage:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  region: us-east-1
  bucket:
    avatars: avatars
    contracts: contracts
    cvs: cvs
    news-covers: news-covers
    board-attachments: board-attachments
  signed-url-expiry-minutes: 60

logging:
  level:
    root: WARN
    com.company.intranet: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
